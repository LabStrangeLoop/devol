# Diffusion Evolution Configuration for MNIST
evolution:
  population_size: 256
  num_steps: 50
#  param_dim: 61706  # LeNet5 total parameters
  param_dim: 7674
  sigma_m: 1.0
  seed: 42

  schedule:
    type: cosine
    epsilon: 0.0001

  fitness:
    mapping: exponential
    temperature: 1.0
    normalize: true
    shift_negative: true

  distance:
    type: latent
    latent_dim: 10

# MNIST-specific settings
mini_batch_size: 512
eval_batch_size: 32
early_stopping_patience: 10
validation_check_interval: 5
target_accuracy: 99.0
device: cuda
save_checkpoints: true
checkpoint_dir: ./mnist_checkpoints
verbose: true
model_type: mini
